# Fly production overrides for the main Trinket app (non-secret values only —
# secrets arrive at runtime via the single NODE_CONFIG JSON secret, composed by
# `make secrets-app`; the app's config@0.4.x has no custom-environment-variables
# support). Copied to config/production.yaml by fly/docker/app.Dockerfile and
# deep-merged over config/default.yaml when NODE_ENV=production.

features:
  courses: false
  # Uploads to Tigris (config/aws.js endpoint patch applied). Requires: the app
  # holding a key that can write to stem-trinket-uploads, and that bucket being
  # publicly readable so embedded <img> URLs resolve (ENG-1885).
  assets: true
  # NB trinket-type switches are NESTED under features.trinkets — a flat
  # features.python3 is silently ignored (found the hard way).
  trinkets:
    python: true        # client-side Skulpt Python
    html: true          # client-side HTML/CSS/JS
    python3: true       # server-side, needs the python3 apps
    pygame: true        # server-side, needs the pygame apps
    java: false
    R: false

app:
  url:
    protocol: https
    hostname: ide.stem.org.uk
  plugins:
    session:
      cookieOptions:
        # password (the session secret) comes from the SESSION_SECRET Fly secret
        isSecure: true
        domain: .ide.stem.org.uk
  embed:
    # Serve Skulpt (the in-browser Python engine) from the app's own
    # /components/skulpt/ instead of the default external CDN host
    # (aws.buckets.cdn.host), which we don't configure — leaving it unset made
    # the browser request an unresolvable host (ERR_NAME_NOT_RESOLVED) and
    # client-side Python trinkets failed with "Sk is not defined". The files
    # ship in the components bundle. min: use the minified copy.
    skulpt:
      local: true
      min: true
  # The execution stack lives on its own public hostname (cross-origin from
  # the app page — hence corsOrigins on the managers). The frontend derives
  # the Socket.IO path from these URLs: /python3/socket.io/, /pygame/socket.io/.
  # NB nested under app — the embed template reads config.app.serverside.*;
  # a top-level serverside: block is silently ignored (found the hard way,
  # same trap as features.trinkets).
  serverside:
    python3:
      api:
        default: 'https://exec.ide.stem.org.uk/python3'
    pygame:
      api:
        default: 'https://exec.ide.stem.org.uk/pygame'

db:
  mongo:
    # db.mongo.uri comes from the NODE_CONFIG secret.
    # database is here for completeness; the Atlas URI carries its own.
    database: trinket
  redis:
    enabled: true
    app:
      # host/pass come from the NODE_CONFIG secret; Fly managed Redis (Upstash)
      # private endpoint is plaintext :6379 over the private network.
      port: 6379

aws:
  # Tigris ignores region; 'auto' is what `fly storage create` emits.
  region: auto
  # One private bucket for all upload types at this scale. Tigris bucket names
  # are globally unique — if stem-trinket-uploads is taken, change it here AND
  # in fly/Makefile (TIGRIS_UPLOADS).
  buckets:
    userassets:
      name: stem-trinket-uploads
      host: 'https://stem-trinket-uploads.t3.tigrisfiles.io'
      thumbnail: 'thumb-%{s}'
      # No Lambda on Fly: thumbnails fall back to the original asset host.
      thumbnailHost: 'https://stem-trinket-uploads.t3.tigrisfiles.io'
      thumbnailBucket: stem-trinket-uploads
    snapshots:
      name: stem-trinket-uploads
      host: 'https://stem-trinket-uploads.t3.tigrisfiles.io'
    materials:
      name: stem-trinket-uploads
      host: 'https://stem-trinket-uploads.t3.tigrisfiles.io'
    useravatars:
      name: stem-trinket-uploads
      host: 'https://stem-trinket-uploads.t3.tigrisfiles.io'

