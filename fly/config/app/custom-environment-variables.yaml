# Maps Fly secrets (env vars) onto node-config keys for the main Trinket app.
# Copied to config/custom-environment-variables.yaml by fly/docker/app.Dockerfile.
# The stock repo has no such file for the main app — without it, `fly secrets set`
# values would never reach the config tree.
# Highest precedence in node-config: these override default.yaml AND production.yaml.

db:
  mongo:
    # Full Atlas connection string (mongodb+srv://...). Honored once the small
    # config/db.js patch lands (fly/README.md follow-up F1) — the stock code
    # builds a bare mongodb://host:port/db string that can't express Atlas
    # TLS/SRV/replica-set options.
    uri: MONGODB_URI
    # Legacy piecewise fields, kept mapped for non-Atlas fallback/debugging.
    host: MONGO_HOST
    user: MONGO_USER
    pass: MONGO_PASS
  redis:
    app:
      host: REDIS_HOST
      pass: REDIS_PASSWORD

app:
  plugins:
    session:
      cookieOptions:
        password: SESSION_SECRET

aws:
  keyId: AWS_ACCESS_KEY_ID
  key: AWS_SECRET_ACCESS_KEY
  # Consumed once the config/aws.js Tigris patch lands (follow-up F2).
  endpoint: AWS_ENDPOINT_URL_S3
