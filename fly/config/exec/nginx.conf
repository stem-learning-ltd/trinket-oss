# Fly-specific nginx config for stem-trinket-exec (https://exec.trinket.stem.org.uk).
# Differences from serverside/nginx/nginx.conf (the Docker-compose original):
#   - resolver is Fly internal DNS (fdaa::3), not Docker's 127.0.0.11, and
#     ipv6 is NOT disabled — .flycast/.internal names only have AAAA records,
#     so the original `ipv6=off` would break every upstream lookup.
#   - upstreams are .flycast app addresses (fly-proxy load-balances and wakes
#     auto-stopped Machines), not Docker service names.
#   - java/r locations dropped (this deployment is python3 + pygame only).
#   - shared-volume *-generated alias locations dropped: Fly Volumes are
#     per-Machine, so the "manager writes / nginx reads" pattern can't work.
#     Generated files go to Tigris (see fly/README.md follow-ups F3/F4).
# CORS note: the Socket.IO managers emit the CORS headers themselves (from
# their corsOrigins config); nginx must not add its own or browsers will see
# duplicate headers and reject the cross-origin handshake.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Fly internal DNS. Short validity so Machine/proxy IP churn is picked up.
    resolver [fdaa::3] valid=10s;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Preserve the client's original scheme. fly-proxy terminates TLS and sets
    # X-Forwarded-Proto=https; nginx listens on plain :80 so $scheme is "http".
    # The pygame manager builds the noVNC URL (ws:// vs wss://) from this header
    # — overwriting it with $scheme yields ws:// on an https page, which the
    # browser blocks as mixed content. Pass the incoming value through, falling
    # back to $scheme only when absent (direct/local access).
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Health check (wired into fly.exec.toml http checks)
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Upstreams are variables so nginx resolves them per-request via Fly
        # DNS instead of caching one IP at startup.

        # Python3 manager Socket.IO (browser path: /python3/socket.io/)
        location /python3/ {
            set $python3_upstream stem-trinket-python3-manager.flycast:8100;
            rewrite ^/python3/(.*) /$1 break;
            proxy_pass http://$python3_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Pygame manager Socket.IO (browser path: /pygame/socket.io/)
        location /pygame/ {
            set $pygame_upstream stem-trinket-pygame-manager.flycast:8100;
            rewrite ^/pygame/(.*) /$1 break;
            proxy_pass http://$pygame_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Pygame noVNC stream (browser path: /pygame-vnc/websockify) —
        # straight to the worker's websockify on :6080.
        location /pygame-vnc/ {
            set $pygame_vnc_upstream stem-trinket-pygame-worker.flycast:6080;
            rewrite ^/pygame-vnc/(.*) /$1 break;
            proxy_pass http://$pygame_vnc_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
}
